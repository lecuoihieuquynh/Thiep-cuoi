<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thiệp Cưới Hiếu & Quỳnh</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(rgba(255,245,248,.75),rgba(255,245,248,.75)),
url("https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

font-family:Arial,sans-serif;

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

}

/* Phong bì */

#cover{

position:fixed;

width:100%;

height:100%;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#FFE7EE,#FFF8FB);

transition:1s;

z-index:99;

}

.envelope{

width:340px;
height:220px;

background:linear-gradient(145deg,#f9d5e3,#efb9cd);

border-radius:18px;

position:relative;

cursor:pointer;

box-shadow:
0 25px 60px rgba(0,0,0,.20),
0 8px 20px rgba(255,255,255,.35) inset;

transition:.35s;

overflow:hidden;

}

.envelope:hover{

transform:translateY(-8px) scale(1.03);

box-shadow:
0 35px 70px rgba(0,0,0,.25),
0 8px 20px rgba(255,255,255,.4) inset;

}


.flap{

position:absolute;

top:0;

left:0;

width:0;

height:0;

border-left:160px solid transparent;

border-right:160px solid transparent;

border-top:110px solid #F0AFC4;

transform-origin:top;

transition:1s;

z-index:5;

}

.letter{

position:absolute;

left:15px;

bottom:15px;

width:290px;

height:170px;

background:white;

border-radius:10px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:22px;

color:#B66A83;

transition:1s;

}

#card{

display:none;

opacity:0;

transition:1s;

text-align:center;

width:90%;

max-width:700px;

background:white;

padding:50px;

border-radius:20px;

box-shadow:0 20px 60px rgba(0,0,0,.18);

}

#card h1{

font-size:42px;

color:#C16D89;

margin:15px 0;

}

#card p{

font-size:22px;

margin-top:20px;

color:#666;

}

</style>

</head>

<body>

<div id="cover">

<div class="envelope" onclick="openCard()">

<div class="flap"></div>

<div class="letter">

💌

<p style="margin-top:10px;font-size:18px">

Nhấn để mở thiệp

</p>

</div>

</div>

</div>

<div id="card">

<h1>Phạm Minh Hiếu</h1>

<div style="font-size:55px;margin:18px 0;">💍</div>

<h1>Lê Như Quỳnh</h1>

<p>08 • 02 • 2026</p>

</div>

<script>

function openCard(){

document.querySelector(".flap").style.transform="rotateX(180deg)";

document.querySelector(".letter").style.transform="translateY(-170px) scale(1.05)";
document.querySelector(".letter").style.boxShadow="0 20px 40px rgba(0,0,0,.2)";
setTimeout(()=>{

document.getElementById("cover").style.opacity="0";

setTimeout(()=>{

document.getElementById("cover").style.display="none";

let card=document.getElementById("card");

card.style.display="block";

setTimeout(()=>{

card.style.opacity="1";

},100);

},500);

},1200);

}

</script>

</body>
</html>
